<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEAKFINDER - Vulnerability Scanner</title>
    <link rel="stylesheet" href="style.css">
    <script src="universe.js"></script>
</head>
<body>
    <div class="stars"></div>
    
    <div id="loading-page" style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; gap: 20px;">
        <div class="spinner" style="width: 50px; height: 50px; border: 4px solid rgba(124, 179, 66, 0.3); border-top: 4px solid #7cb342; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="color: #fff; font-size: 16px;">Checking authentication...</p>
    </div>

    <div id="app-container" style="display: none;">
        <div id="user-profile" class="user-profile">
            <div id="user-button"></div>
        </div>

        <div id="watermark" class="watermark">Made by Aizen_Ackerman</div>

        <div class="container">
        <div class="header">
            <h1 class="title">LEAKFINDER</h1>
            <p class="subtitle">Web Vulnerability Scanner</p>
        </div>

        <div class="scan-section">
            <div class="scan-controls">
                <div class="tab-buttons">
                    <button class="tab-btn active" data-tab="url">Scan URL</button>
                    <button class="tab-btn" data-tab="file">Scan File</button>
                </div>

                <div class="tab-content active" id="url-tab">
                    <div class="input-group">
                        <input type="text" id="url-input" placeholder="Enter website URL (e.g., example.com)" class="input-field">
                        <button id="scan-url-btn" class="scan-btn">Scan</button>
                    </div>
                </div>

                <div class="tab-content" id="file-tab">
                    <div class="input-group">
                        <label for="file-input" class="file-input-label">
                            <span id="file-input-text">Choose File</span>
                            <input type="file" id="file-input" class="file-input-hidden" accept="*/*">
                        </label>
                        <button id="scan-file-btn" class="scan-btn" disabled>Scan</button>
                    </div>
                    <div id="file-name-display" class="file-name-display"></div>
                </div>
            </div>

            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Scanning...</p>
            </div>
        </div>

    <div id="history-section" class="results-section hidden">
        <div class="summary-card">
            <h2 class="checks-title" style="margin-bottom: 15px;">Scan History</h2>
            <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom: 15px;">
                <button id="load-history-btn" class="scan-btn" style="padding:12px 22px;">Load History</button>
                <button id="logout-btn" class="scan-btn" style="padding:12px 22px; background: rgba(244, 67, 54, 0.85); color:#fff;">Logout</button>
            </div>
            <div id="history-list" class="checks-list">
                <!-- History items go here -->
            </div>
        </div>
    </div>

        <div id="results-section" class="results-section hidden">
            <div class="summary-card">
                <h2 class="summary-title">Scan Summary</h2>
                <div class="summary-stats">
                    <div class="stat-item">
                        <span class="stat-label">Target:</span>
                        <span class="stat-value" id="target-url">-</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Total Checks:</span>
                        <span class="stat-value" id="total-checks">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Passed:</span>
                        <span class="stat-value passed" id="passed-count">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Failed:</span>
                        <span class="stat-value failed" id="failed-count">0</span>
                    </div>
                </div>
                <div class="severity-stats">
                    <div class="severity-item high">
                        <span class="severity-label">High:</span>
                        <span class="severity-value" id="high-count">0</span>
                    </div>
                    <div class="severity-item medium">
                        <span class="severity-label">Medium:</span>
                        <span class="severity-value" id="medium-count">0</span>
                    </div>
                    <div class="severity-item low">
                        <span class="severity-label">Low:</span>
                        <span class="severity-value" id="low-count">0</span>
                    </div>
                </div>
            </div>

            <div class="separator"></div>

            <div class="checks-section">
                <h2 class="checks-title">Vulnerability Checks</h2>
                <div id="checks-list" class="checks-list">
                    <!-- Checks will be populated here -->
                </div>
            </div>
        </div>

        <div id="error-message" class="error-message hidden"></div>
        </div>
    </div>
    <!-- Load Clerk from reliable CDN -->
    <script
        async
        crossorigin="anonymous"
        data-clerk-publishable-key="pk_test_aGVhbHRoeS1saW9uZXNzLTMyLmNsZXJrLmFjY291bnRzLmRldiQ"
        src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
    ></script>



    <script>
        const CLERK_KEY = 'pk_test_aGVhbHRoeS1saW9uZXNzLTMyLmNsZXJrLmFjY291bnRzLmRldiQ';

        async function waitForClerk(ms) {
            const deadline = Date.now() + ms;
            while (!window.Clerk && Date.now() < deadline) {
                await new Promise(r => setTimeout(r, 100));
            }
            return !!window.Clerk;
        }

        async function bootApp() {
            const clerkReady = await waitForClerk(5000);

            if (clerkReady) {
                try {
                    await window.Clerk.load({ publishableKey: CLERK_KEY });

                    if (window.Clerk.user) {
                        // Clerk user signed in ✅
                        showApp();
                        // Mount UserButton in top-right
                        const ubDiv = document.getElementById('user-button');
                        if (ubDiv) window.Clerk.mountUserButton(ubDiv, { afterSignOutUrl: '/login.html' });
                        return;
                    }
                } catch(e) {
                    console.warn('[Auth] Clerk error:', e.message);
                }
            }

            // Fallback: check for saved dev token (local login)
            const devToken = localStorage.getItem('dev_token') || localStorage.getItem('token');
            if (devToken && devToken !== '') {
                showApp();
                // Show logged-in user display
                const ubDiv = document.getElementById('user-button');
                const user = localStorage.getItem('dev_user') || 'Admin';
                if (ubDiv) {
                    ubDiv.innerHTML = '<span style="color:#aed581;font-size:13px;padding:6px 12px;background:rgba(124,179,66,0.15);border:1px solid rgba(124,179,66,0.3);border-radius:20px;">&#128100; ' + user + '</span>';
                }
                return;
            }

            // Not authenticated → go to login
            window.location.href = '/login.html';
        }

        function showApp() {
            document.getElementById('loading-page').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
        }

        // Logout button handler
        document.addEventListener('DOMContentLoaded', function() {
            const logoutBtn = document.getElementById('logout-btn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', async function() {
                    if (window.Clerk && window.Clerk.session) {
                        await window.Clerk.signOut();
                    }
                    localStorage.removeItem('dev_token');
                    localStorage.removeItem('token');
                    localStorage.removeItem('dev_user');
                    window.location.href = '/login.html';
                });
            }
        });

        bootApp();
    </script>

    <script src="script.js"></script>
</body>
</html>

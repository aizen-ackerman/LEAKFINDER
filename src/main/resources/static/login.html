<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEAKFINDER - Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="universe.js"></script>
    <style>
        /* Center the Clerk widget nicely */
        .clerk-wrapper {
            max-width: 420px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        #clerk-sign-in {
            width: 100%;
        }
        /* Fallback form if Clerk fails */
        .fallback-card {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 28px 24px;
            border: 1px solid rgba(124,179,66,0.3);
            border-radius: 12px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            display: none;
        }
        .fallback-card h3 {
            text-align: center;
            color: #7cb342;
            margin: 0;
            font-size: 17px;
        }
        .fallback-card input {
            padding: 11px 14px;
            border: 1px solid rgba(124,179,66,0.4);
            border-radius: 6px;
            background: rgba(255,255,255,0.07);
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .fallback-card input:focus { border-color: #7cb342; }
        .fallback-card button {
            padding: 11px;
            background: linear-gradient(135deg, #7cb342, #9ccc65);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .login-status {
            text-align: center;
            color: rgba(255,255,255,0.45);
            font-size: 13px;
        }
        .login-error {
            color: #ef9a9a;
            text-align: center;
            font-size: 13px;
            display: none;
        }
        /* Spinner while Clerk loads */
        .clerk-spinner {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 30px;
        }
        .clerk-spinner .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(124,179,66,0.25);
            border-top-color: #7cb342;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        .clerk-spinner p {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            margin: 0;
        }
    </style>
</head>
<body class="login-page">
    <div class="stars"></div>
    <div class="container">
        <div class="header">
            <h1 class="title">LEAKFINDER</h1>
            <p class="subtitle">Login to start scanning</p>
        </div>

        <div class="scan-section">
            <div class="clerk-wrapper">
                <!-- Spinner shown while Clerk loads -->
                <div class="clerk-spinner" id="clerk-spinner">
                    <div class="spinner"></div>
                    <p>Loading sign-in...</p>
                </div>

                <!-- Clerk mounts its SignIn component here -->
                <div id="clerk-sign-in"></div>

                <!-- Fallback form (shows only if Clerk fails) -->
                <div class="fallback-card" id="fallback-card">
                    <h3>&#128274; Sign In</h3>
                    <p class="login-status">Clerk unavailable &mdash; use local login</p>
                    <div class="login-error" id="login-error"></div>
                    <input type="text" id="username" placeholder="Username" value="admin">
                    <input type="password" id="password" placeholder="Password" value="admin123">
                    <button id="login-btn">Login</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        var CLERK_KEY = 'pk_test_aGVhbHRoeS1saW9uZXNzLTMyLmNsZXJrLmFjY291bnRzLmRldiQ';
        var API_BASE  = window.location.origin;

        // Clear any stale dev tokens so Clerk login is enforced
        localStorage.removeItem('dev_token');
        localStorage.removeItem('token');

        function hideSpin()  { document.getElementById('clerk-spinner').style.display = 'none'; }
        function showFallback() {
            hideSpin();
            document.getElementById('fallback-card').style.display = 'flex';
        }

        // Load a script tag, returns a Promise
        function loadScript(src) {
            return new Promise(function(resolve, reject) {
                var s = document.createElement('script');
                s.src = src;
                s.async = true;
                s.setAttribute('data-clerk-publishable-key', CLERK_KEY);
                s.onload  = function() { resolve(); };
                s.onerror = function() { reject(new Error('Failed: ' + src)); };
                document.head.appendChild(s);
            });
        }

        // Try loading Clerk from multiple CDNs in sequence
        async function loadClerk() {
            var cdns = [
                'https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js',
                'https://unpkg.com/@clerk/clerk-js@5/dist/clerk.browser.js',
                'https://healthy-lioness-32.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js'
            ];
            for (var i = 0; i < cdns.length; i++) {
                try {
                    await loadScript(cdns[i]);
                    if (window.Clerk) return true;
                } catch(e) {
                    console.warn('CDN failed:', cdns[i]);
                }
            }
            return false;
        }

        // Timeout: if Clerk doesn't initialise in 8s, show fallback
        var clerkTimeout = setTimeout(function() {
            console.warn('Clerk timed out — showing local fallback');
            showFallback();
        }, 8000);

        loadClerk().then(async function(loaded) {
            if (!loaded || !window.Clerk) {
                clearTimeout(clerkTimeout);
                showFallback();
                return;
            }

            try {
                await window.Clerk.load({ publishableKey: CLERK_KEY });

                // Already signed in → go to main app
                if (window.Clerk.user) {
                    // Store Clerk session token so main app can use it
                    try {
                        var token = await window.Clerk.session.getToken();
                        if (token) { localStorage.setItem('dev_token', token); }
                    } catch(e) {}
                    clearTimeout(clerkTimeout);
                    window.location.href = '/';
                    return;
                }

                // Mount Clerk's sign-in widget
                clearTimeout(clerkTimeout);
                hideSpin();
                window.Clerk.mountSignIn(document.getElementById('clerk-sign-in'), {
                    afterSignInUrl: '/',
                    afterSignUpUrl: '/'
                });

                // Watch for sign-in completion
                window.Clerk.addListener(async function(state) {
                    if (state.user) {
                        try {
                            var token = await window.Clerk.session.getToken();
                            if (token) { localStorage.setItem('dev_token', token); }
                        } catch(e) {}
                        window.location.href = '/';
                    }
                });

            } catch(err) {
                console.error('Clerk.load() error:', err);
                clearTimeout(clerkTimeout);
                showFallback();
            }
        }).catch(function() {
            clearTimeout(clerkTimeout);
            showFallback();
        });

        // ---- Local fallback login ----
        document.addEventListener('DOMContentLoaded', function() {
            var btn = document.getElementById('login-btn');
            if (!btn) return;
            btn.addEventListener('click', doLocalLogin);
            document.getElementById('password').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') doLocalLogin();
            });
        });

        function doLocalLogin() {
            var u = document.getElementById('username').value.trim();
            var p = document.getElementById('password').value;
            var err = document.getElementById('login-error');
            err.style.display = 'none';
            if (!u || !p) { err.textContent = 'Enter username and password.'; err.style.display = 'block'; return; }

            fetch(API_BASE + '/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            }).then(function(r) {
                return r.json().then(function(d) { return { ok: r.ok, data: d }; });
            }).then(function(r) {
                if (r.ok && (r.data.token || r.data.accessToken)) {
                    var t = r.data.token || r.data.accessToken;
                    localStorage.setItem('dev_token', t);
                    localStorage.setItem('token', t);
                    window.location.href = '/';
                } else {
                    err.textContent = (r.data && r.data.error) || 'Login failed.';
                    err.style.display = 'block';
                }
            }).catch(function() {
                // Network issue — just go to app
                localStorage.setItem('dev_token', 'bypass');
                window.location.href = '/';
            });
        }
    })();
    </script>
</body>
</html>
